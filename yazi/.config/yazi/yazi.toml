"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[preview]
max_width = 1200
max_height = 1800
image_delay = 30

[plugin]
prepend_preloaders = [
  { mime = "image/*", run = "noop" },
  { mime = "application/pdf", run = "noop" },
]
prepend_previewers = [
  { mime = "image/*", run = "noop" },
  { mime = "application/pdf", run = "noop" },
]
